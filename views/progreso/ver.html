<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progreso del Paciente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
  <div id="appNavbar"></div>

  <div class="container">
    <main class="main-content">
      <div class="container mt-4">
        <div id="alertBox"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h3 id="titulo">Progreso del paciente</h3>
            <p class="text-muted mb-0">Revisa el avance registrado y genera un informe en PDF.</p>
          </div>

          <div class="btn-group">
            <a id="reportLink" href="#" class="btn btn-outline-secondary">
              Ver informe
            </a>
          </div>
        </div>

        <div class="row gy-4">
          <div class="col-lg-6">
            <div class="card shadow">
              <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Última rutina asignada</h5>
              </div>
              <div class="card-body" id="rutinaBox"></div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="card shadow">
              <div class="card-header bg-success text-white">
                <h5 class="mb-0">Estado de avance</h5>
              </div>
              <div class="card-body" id="avanceBox"></div>
            </div>
          </div>
        </div>

        <div class="card shadow my-4">
          <div class="card-header bg-secondary text-white">
            <h5 class="mb-0">Historial de progreso</h5>
          </div>

          <div class="card-body">
            <form id="progresoForm" class="row g-2 mb-4" style="display:none">
              <input type="hidden" name="id_rutina">

              <div class="col-md-3">
                <input
                  type="number"
                  name="porcentaje"
                  class="form-control"
                  placeholder="Porcentaje"
                  min="0"
                  max="100"
                  required
                >
              </div>

              <div class="col-md-7">
                <input
                  type="text"
                  name="comentarios"
                  class="form-control"
                  placeholder="Observaciones"
                >
              </div>

              <div class="col-md-2">
                <button class="btn btn-success w-100">Guardar</button>
              </div>
            </form>

            <div class="table-responsive">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Fecha</th>
                    <th>Porcentaje</th>
                    <th>Observaciones</th>
                  </tr>
                </thead>

                <tbody id="progresosBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <a href="../rutinas/index.html" class="btn btn-secondary">
          Volver a rutinas
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/layout.js"></script>

  <script>
    requireAuth();
    renderNavbar("rutinas");

    const id = getParam("id");

    const titulo = document.getElementById("titulo");
    const reportLink = document.getElementById("reportLink");
    const rutinaBox = document.getElementById("rutinaBox");
    const avanceBox = document.getElementById("avanceBox");
    const progresosBody = document.getElementById("progresosBody");
    const progresoForm = document.getElementById("progresoForm");

    reportLink.href = `reporte.html?id=${id}`;

    async function cargar() {
      try {
        const d = await apiFetch(`/api/progreso/paciente/${id}`);
        const p = d.paciente;

        titulo.textContent = `Progreso de ${p.nombre} ${p.apaterno} ${p.amaterno || ""}`;

        if (d.rutina) {
          const r = d.rutina;

          rutinaBox.innerHTML = `
            <p><strong>Fecha de asignación:</strong> ${formatDate(r.fecha_asignacion)}</p>
            <p><strong>Video:</strong> ${escapeHtml(r.video_titulo || "No asignado")}</p>
            <p><strong>Tiempo estimado:</strong> ${r.tiempo ? r.tiempo + " min" : "—"}</p>
            <p><strong>Series:</strong> ${r.series || "—"}</p>
            <p><strong>Repeticiones:</strong> ${r.repeticiones || "—"}</p>
            <p><strong>Observaciones:</strong> ${escapeHtml(r.observaciones || "Sin observaciones")}</p>
          `;

          document.querySelector("[name=id_rutina]").value = r.id_rutina;
          progresoForm.style.display = "flex";
        } else {
          rutinaBox.innerHTML = `
            <div class="alert alert-info mb-0">
              Este paciente aún no tiene una rutina asignada.
            </div>
          `;
        }

        avanceBox.innerHTML = `
          <p><strong>Registros totales:</strong> ${d.progresos.length}</p>
          <p><strong>Avance promedio:</strong> ${Number(d.averageProgress || 0).toFixed(1)}%</p>
          <p><strong>Último registro:</strong> ${
            d.progresos.length ? formatDate(d.progresos[0].fecha_realizacion) : "Sin registros"
          }</p>
        `;

        progresosBody.innerHTML = d.progresos.length
          ? d.progresos.map(x => `
              <tr>
                <td>${formatDate(x.fecha_realizacion)}</td>
                <td>${x.porcentaje}%</td>
                <td>${escapeHtml(x.comentarios || "—")}</td>
              </tr>
            `).join("")
          : `
            <tr>
              <td colspan="3" class="text-muted">
                No hay registros de avance todavía.
              </td>
            </tr>
          `;
      } catch (e) {
        showAlert("alertBox", "danger", e.message || "Error al cargar progreso");
      }
    }

    progresoForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const d = await apiFetch("/api/progreso", {
          method: "POST",
          body: JSON.stringify(formToObject(progresoForm))
        });

        showAlert("alertBox", "success", d.message || "Progreso guardado");
        progresoForm.reset();
        cargar();
      } catch (err) {
        showAlert("alertBox", "danger", err.message || "Error al guardar");
      }
    });

    cargar();
  </script>
</body>
</html>
