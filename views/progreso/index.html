<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <h3 class="mb-4">Progreso de Pacientes</h3>
                <div class="card shadow">
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Paciente</th>
                                    <th>Ver Informe</th>
                                </tr>
                            </thead>
                            <tbody id="pacientesBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('progreso');</script>
    <script>(async () => { try { const d = await apiFetch('/api/progreso'); pacientesBody.innerHTML = (d.pacientes && d.pacientes.length) ? d.pacientes.map(p => `<tr><td>${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</td><td><a href="ver.html?id=${p.id_usuario}" class="btn btn-primary btn-sm">Ver Progreso</a></td></tr>`).join('') : '<tr><td colspan="2">No hay pacientes registrados.</td></tr>' } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error') } })()</script>
</body>

</html>
