<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Progreso - CEFIRET</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/app.css">
</head>
<body>
  <div id="appNavbar"></div>

  <div class="container">
    <main class="main-content">
      <div id="alertBox"></div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3>Reporte de progreso</h3>
          <p class="text-muted mb-0">Genera un PDF formal del avance del paciente.</p>
        </div>

        <div class="d-flex gap-2">
          <button id="pdfBtn" class="btn btn-dark">Descargar PDF</button>
          <a id="volverLink" href="#" class="btn btn-secondary">Volver</a>
        </div>
      </div>

      <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Vista previa del reporte</h5>
        </div>

        <div class="card-body">
          <div id="previewBox">
            <p class="text-muted">Cargando información...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/layout.js"></script>

  <script>
    requireAuth();
    renderNavbar('rutinas');

    const idPaciente = getParam('id');
    let reporteData = null;

    document.getElementById('volverLink').href = `ver.html?id=${idPaciente}`;

    async function cargarReporte() {
      try {
        const data = await apiFetch(`/api/progreso/paciente/${idPaciente}/reporte`);
        reporteData = data;

        const paciente = data.paciente;
        const progresos = data.progresos || [];

        document.getElementById('previewBox').innerHTML = `
          <div class="row">
            <div class="col-md-6">
              <h5>Datos del paciente</h5>
              <p><strong>Nombre:</strong> ${escapeHtml(paciente.nombre)} ${escapeHtml(paciente.apaterno)} ${escapeHtml(paciente.amaterno)}</p>
              <p><strong>Correo:</strong> ${escapeHtml(paciente.correo || 'No disponible')}</p>
              <p><strong>Teléfono:</strong> ${escapeHtml(paciente.telefono || 'No disponible')}</p>
            </div>

            <div class="col-md-6">
              <h5>Resumen</h5>
              <p><strong>Total de registros:</strong> ${data.totalRecords}</p>
              <p><strong>Promedio de avance:</strong> ${Number(data.averageProgress || 0).toFixed(1)}%</p>
              <p><strong>Fecha de generación:</strong> ${new Date().toLocaleDateString('es-MX')}</p>
            </div>
          </div>

          <hr>

          <h5>Registros de avance</h5>

          ${
            progresos.length
              ? `
                <div class="table-responsive">
                  <table class="table table-striped">
                    <thead>
                      <tr>
                        <th>Fecha</th>
                        <th>Rutina / Video</th>
                        <th>Porcentaje</th>
                        <th>Comentarios</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${progresos.map(p => `
                        <tr>
                          <td>${formatDate(p.fecha_realizacion)}</td>
                          <td>${escapeHtml(p.video_titulo || 'Sin video')}</td>
                          <td>${p.porcentaje || 0}%</td>
                          <td>${escapeHtml(p.comentarios || 'Sin comentarios')}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `
              : `<p class="text-muted">No hay registros de progreso para este paciente.</p>`
          }
        `;
      } catch (error) {
        showAlert('alertBox', 'danger', error.message || 'No se pudo cargar el reporte.');
      }
    }

    async function cargarLogoBase64() {
      try {
        const response = await fetch('../../img/logo.jpg');
        const blob = await response.blob();

        return await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(blob);
        });
      } catch {
        return null;
      }
    }

    async function generarPDF() {
      if (!reporteData) {
        showAlert('alertBox', 'warning', 'Primero espera a que cargue el reporte.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'letter');

      const paciente = reporteData.paciente;
      const progresos = reporteData.progresos || [];
      const logo = await cargarLogoBase64();

      const pageWidth = doc.internal.pageSize.getWidth();
      const margin = 14;

      if (logo) {
        doc.addImage(logo, 'JPEG', margin, 10, 24, 24);
      }

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.text('CEFIRET', logo ? 42 : margin, 17);

      doc.setFontSize(12);
      doc.text('Reporte de progreso del paciente', logo ? 42 : margin, 24);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text('Centro de Fisioterapia y Rehabilitacion', logo ? 42 : margin, 30);

      doc.setDrawColor(13, 90, 142);
      doc.setLineWidth(0.5);
      doc.line(margin, 38, pageWidth - margin, 38);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.text('Datos del paciente', margin, 48);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);

      const nombreCompleto = `${paciente.nombre || ''} ${paciente.apaterno || ''} ${paciente.amaterno || ''}`.trim();

      doc.text(`Nombre: ${nombreCompleto}`, margin, 56);
      doc.text(`Correo: ${paciente.correo || 'No disponible'}`, margin, 62);
      doc.text(`Telefono: ${paciente.telefono || 'No disponible'}`, margin, 68);
      doc.text(`Fecha de generacion: ${new Date().toLocaleDateString('es-MX')}`, margin, 74);

      doc.setFont('helvetica', 'bold');
      doc.text('Resumen de avance', margin, 86);

      doc.setFont('helvetica', 'normal');
      doc.text(`Total de registros: ${reporteData.totalRecords || 0}`, margin, 94);
      doc.text(`Promedio de avance: ${Number(reporteData.averageProgress || 0).toFixed(1)}%`, margin, 100);

      const rows = progresos.map(item => [
        formatDate(item.fecha_realizacion),
        item.video_titulo || 'Sin video',
        `${item.porcentaje || 0}%`,
        item.comentarios || 'Sin comentarios'
      ]);

      doc.autoTable({
        startY: 112,
        head: [['Fecha', 'Rutina / Video', 'Avance', 'Comentarios']],
        body: rows.length ? rows : [['Sin registros', 'Sin información', '0%', 'No hay comentarios']],
        styles: {
          fontSize: 8,
          cellPadding: 2
        },
        headStyles: {
          fillColor: [13, 90, 142],
          textColor: [255, 255, 255]
        },
        columnStyles: {
          0: { cellWidth: 28 },
          1: { cellWidth: 48 },
          2: { cellWidth: 22 },
          3: { cellWidth: 80 }
        },
        margin: {
          left: margin,
          right: margin
        }
      });

      const finalY = doc.lastAutoTable.finalY + 12;

      doc.setFontSize(9);
      doc.setTextColor(90);
      doc.text('Este reporte fue generado automaticamente por el sistema CEFIRET.', margin, finalY);

      const totalPages = doc.internal.getNumberOfPages();

      for (let i = 1; i <= totalPages; i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(120);
        doc.text(`Pagina ${i} de ${totalPages}`, pageWidth - margin - 25, 270);
      }

      const nombreArchivo = `reporte_progreso_${nombreCompleto.replaceAll(' ', '_') || 'paciente'}.pdf`;

      doc.save(nombreArchivo);
    }

    document.getElementById('pdfBtn').addEventListener('click', generarPDF);

    cargarReporte();
  </script>
</body>
</html>
