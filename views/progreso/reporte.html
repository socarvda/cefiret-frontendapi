<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Informe de Progreso</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container mt-4"><div id="alertBox"></div><div class="d-flex justify-content-between align-items-start mb-4"><div><h3 id="titulo">Informe de progreso</h3><p class="text-muted">Resumen de avance, observaciones y datos de rutina.</p></div><div class="btn-group"><button type="button" class="btn btn-dark" onclick="window.print()">Descargar PDF</button><button type="button" class="btn btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card shadow mb-4"><div class="card-header bg-primary text-white"><h5 class="mb-0">Datos del paciente</h5></div><div class="card-body" id="pacienteBox"></div></div><div class="card shadow mb-4"><div class="card-header bg-success text-white"><h5 class="mb-0">Resumen de progreso</h5></div><div class="card-body" id="resumenBox"></div></div><div class="card shadow mb-4"><div class="card-header bg-secondary text-white"><h5 class="mb-0">Detalle de registros</h5></div><div class="card-body"><table class="table table-striped"><thead><tr><th>Fecha</th><th>Porcentaje</th><th>Observaciones</th></tr></thead><tbody id="progresosBody"></tbody></table></div></div><a id="volverLink" href="#" class="btn btn-secondary">Volver al progreso del paciente</a></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('progreso');</script><script>const id=getParam('id');volverLink.href=`ver.html?id=${id}`;(async()=>{try{const d=await apiFetch(`/api/progreso/paciente/${id}/reporte`),p=d.paciente;titulo.textContent=`Informe de progreso para ${p.nombre} ${p.apaterno} ${p.amaterno}`;pacienteBox.innerHTML=`<p><strong>Nombre:</strong> ${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</p><p><strong>Email:</strong> ${escapeHtml(p.correo||'No disponible')}</p><p><strong>Tipo:</strong> Paciente</p>`;resumenBox.innerHTML=`<p><strong>Registros totales:</strong> ${d.totalRecords}</p><p><strong>Avance promedio:</strong> ${Number(d.averageProgress||0).toFixed(1)}%</p><p><strong>Último registro:</strong> ${d.progresos.length?formatDate(d.progresos[0].fecha_realizacion):'Sin registros'}</p>`;progresosBody.innerHTML=d.progresos.length?d.progresos.map(x=>`<tr><td>${formatDate(x.fecha_realizacion)}</td><td>${x.porcentaje}%</td><td>${escapeHtml(x.comentarios||x.observaciones||'—')}</td></tr>`).join(''):'<tr><td colspan="3" class="text-muted">No hay registros de progreso para este paciente.</td></tr>'}catch(e){showAlert('alertBox','danger',e.message||'Error')}})()</script></body></html>
