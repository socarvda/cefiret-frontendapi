<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nueva Cita - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container py-4"><div id="alertBox"></div><div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm border-0" style="border-radius:14px;overflow:hidden"><div class="card-header py-3" style="background:linear-gradient(135deg,#1d4ed8,#3b82f6)"><h5 class="mb-0 text-white fw-bold">Agendar Nueva Cita</h5></div><div class="card-body p-4"><form id="citaForm"><div class="mb-3"><label class="form-label fw-semibold">Paciente *</label><select name="paciente_id" id="pacienteSelect" class="form-select" required></select></div><div class="mb-3"><label class="form-label fw-semibold">Fisioterapeuta *</label><select name="fisioterapeuta_id" id="fisioSelect" class="form-select" required></select></div><div class="mb-3"><label class="form-label fw-semibold">Fecha *</label><input type="date" name="fecha" id="fechaInput" class="form-control" required></div><div class="mb-3"><label class="form-label fw-semibold">Hora *</label><select name="hora" id="horaSelect" class="form-select" required><option value="">Selecciona fisio y fecha primero…</option></select></div><div class="mb-4"><label class="form-label fw-semibold">Motivo</label><textarea name="motivo" class="form-control" rows="3" placeholder="Describe el motivo de la consulta…"></textarea></div><div class="d-flex gap-2 justify-content-end"><a href="index.html" class="btn btn-secondary">Cancelar</a><button type="submit" class="btn btn-success">Guardar Cita</button></div></form></div></div></div></div></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('citas');</script><script>fechaInput.min=new Date().toISOString().slice(0,10);async function opciones(){const d=await apiFetch('/api/citas');pacienteSelect.innerHTML='<option value="">Selecciona un paciente...</option>'+d.pacientes.map(p=>`<option value="${p.id_usuario}">${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</option>`).join('');fisioSelect.innerHTML='<option value="">Selecciona un fisioterapeuta...</option>'+d.fisios.map(f=>`<option value="${f.id_usuario}">${escapeHtml(f.nombre)} ${escapeHtml(f.apaterno)}</option>`).join('')}async function disp(){if(!fisioSelect.value||!fechaInput.value)return;try{const d=await apiFetch(`/api/citas/disponibilidad?fisioterapeuta_id=${fisioSelect.value}&fecha=${fechaInput.value}`);horaSelect.innerHTML='<option value="">Selecciona una hora...</option>'+d.disponibles.map(h=>`<option value="${h}">${h}</option>`).join('')}catch(e){horaSelect.innerHTML=['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'].map(h=>`<option value="${h}">${h}</option>`).join('')}}fisioSelect.addEventListener('change',disp);fechaInput.addEventListener('change',disp);citaForm.addEventListener('submit',async e=>{e.preventDefault();try{const d=await apiFetch('/api/citas',{method:'POST',body:JSON.stringify(formToObject(citaForm))});showAlert('alertBox','success',d.message||'Cita creada correctamente');setTimeout(()=>location.href='index.html',900)}catch(err){showAlert('alertBox','danger',err.message||'Error al crear cita')}});opciones()</script></body></html>
