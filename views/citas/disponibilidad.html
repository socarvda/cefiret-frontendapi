<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Disponibilidad - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container"><h2 class="mb-4">Disponibilidad</h2><div id="alertBox"></div><div class="card"><div class="card-body"><form id="f" class="row g-2"><div class="col-md-4"><input type="date" name="fecha" class="form-control" required></div><div class="col-md-4"><input type="number" name="fisioterapeuta_id" class="form-control" placeholder="ID fisioterapeuta"></div><div class="col-md-4"><button class="btn btn-primary">Consultar</button></div></form><hr><div id="res"></div></div></div><a href="index.html" class="btn btn-secondary mt-3">Volver</a></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('citas');</script><script>f.addEventListener("submit",async e=>{e.preventDefault();const fd=new FormData(f);try{const d=await apiFetch(`/api/citas/disponibilidad?fecha=${fd.get("fecha")}&fisioterapeuta_id=${fd.get("fisioterapeuta_id")||""}`);res.innerHTML=`<h5>Horas disponibles:</h5><ul>${d.disponibles.map(h=>`<li>${h}</li>`).join("")}</ul>`}catch(err){showAlert("alertBox","danger",err.message||"Error")}})</script></body></html>
