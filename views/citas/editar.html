<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cita - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container cita-form-page">
                <div id="alertBox"></div>

                <div class="cita-form-card">
                    <h2 class="mb-4">Editar Cita</h2>

                    <form id="citaForm">
                        <div class="mb-3">
                            <label class="form-label">Paciente:</label>
                            <select name="paciente_id" id="pacienteSelect" class="form-control" required>
                                <option value="">Cargando pacientes...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fisioterapeuta:</label>
                            <select name="fisioterapeuta_id" id="fisioSelect" class="form-control" required>
                                <option value="">Cargando fisioterapeutas...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha:</label>
                            <input type="date" name="fecha" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hora:</label>
                            <input type="time" name="hora" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Motivo:</label>
                            <textarea name="motivo" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                Guardar cambios
                            </button>

                            <a href="index.html" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        renderNavbar('citas');

        const id = getParam('id');
        const form = document.getElementById('citaForm');
        const pacienteSelect = document.getElementById('pacienteSelect');
        const fisioSelect = document.getElementById('fisioSelect');

        if (!id) {
            showAlert('alertBox', 'danger', 'No se recibió el ID de la cita.');
        }

        async function cargarDatos() {
            try {
                const dataCitas = await apiFetch('/api/citas');
                const dataCita = await apiFetch(`/api/citas/${id}`);

                const cita = dataCita.cita;

                pacienteSelect.innerHTML = '<option value="">Selecciona un paciente...</option>' +
                    dataCitas.pacientes.map(p => `
                        <option value="${p.id_usuario}">
                            ${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno || '')} ${escapeHtml(p.amaterno || '')}
                        </option>
                    `).join('');

                fisioSelect.innerHTML = '<option value="">Selecciona un fisioterapeuta...</option>' +
                    dataCitas.fisios.map(f => `
                        <option value="${f.id_usuario}">
                            ${escapeHtml(f.nombre)} ${escapeHtml(f.apaterno || '')} ${escapeHtml(f.amaterno || '')}
                        </option>
                    `).join('');

                form.paciente_id.value = cita.id_usuario;
                form.fisioterapeuta_id.value = cita.id_fisioterapeuta;
                form.fecha.value = String(cita.fecha).slice(0, 10);
                form.hora.value = String(cita.hora).slice(0, 5);
                form.motivo.value = cita.motivo || '';
            } catch (error) {
                showAlert('alertBox', 'danger', error.message || 'Error al cargar la cita.');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            try {
                const payload = formToObject(form);

                await apiFetch(`/api/citas/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                window.location.href = 'index.html?updated=1';
            } catch (error) {
                showAlert('alertBox', 'danger', error.message || 'Error al actualizar la cita.');
            }
        });

        cargarDatos();
    </script>
</body>

</html>
