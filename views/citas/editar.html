<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editar Cita - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container cita-form-page"><div id="alertBox"></div><div class="cita-form-card"><h2 class="mb-4">Editar Cita</h2><form id="citaForm"><div class="mb-3"><label>Paciente:</label><select name="paciente_id" id="pacienteSelect" class="form-control" required></select></div><div class="mb-3"><label>Fisioterapeuta:</label><select name="fisioterapeuta_id" id="fisioSelect" class="form-control" required></select></div><div class="mb-3"><label>Fecha:</label><input type="date" name="fecha" class="form-control" required></div><div class="mb-3"><label>Hora:</label><input type="time" name="hora" class="form-control" required></div><div class="mb-3"><label>Motivo:</label><textarea name="motivo" class="form-control"></textarea></div><button class="btn btn-primary">Actualizar</button><a href="index.html" class="btn btn-secondary">Volver</a></form></div></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('citas');</script><script>const id=getParam('id');async function cargar(){const all=await apiFetch('/api/citas'),d=await apiFetch(`/api/citas/${id}`),c=d.cita;pacienteSelect.innerHTML=all.pacientes.map(p=>`<option value="${p.id_usuario}" ${p.id_usuario==c.id_usuario?'selected':''}>${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)}</option>`).join('');fisioSelect.innerHTML=all.fisios.map(f=>`<option value="${f.id_usuario}" ${f.id_usuario==c.id_fisioterapeuta?'selected':''}>${escapeHtml(f.nombre)} ${escapeHtml(f.apaterno)}</option>`).join('');citaForm.fecha.value=c.fecha||'';citaForm.hora.value=formatTime(c.hora);citaForm.motivo.value=c.motivo||''}citaForm.addEventListener('submit',async e=>{e.preventDefault();try{const d=await apiFetch(`/api/citas/${id}`,{method:'PUT',body:JSON.stringify(formToObject(citaForm))});showAlert('alertBox','success',d.message||'Cita actualizada')}catch(err){showAlert('alertBox','danger',err.message||'Error al actualizar')}});cargar()</script></body></html>
