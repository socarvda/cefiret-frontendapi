<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Detalles de Cita - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container cita-details-page"><div id="alertBox"></div><h2 class="mb-4">Detalles de la Cita</h2><div class="card cita-details-card"><div class="card-body" id="detalleBox"></div></div><a href="index.html" class="btn btn-secondary mt-3">Regresar</a></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('citas');</script><script>const id=getParam('id');(async()=>{try{const d=await apiFetch(`/api/citas/${id}`),c=d.cita;detalleBox.innerHTML=`<p><strong>ID:</strong> ${c.id_cita}</p><p><strong>Paciente:</strong> ${escapeHtml(c.paciente)} ${escapeHtml(c.paciente_apaterno||'')}</p><p><strong>Fisioterapeuta:</strong> ${escapeHtml(c.fisio)} ${escapeHtml(c.fisio_apaterno||'')}</p><p><strong>Fecha:</strong> ${formatDate(c.fecha)}</p><p><strong>Hora:</strong> ${formatTime(c.hora)}</p><p><strong>Motivo:</strong> ${escapeHtml(c.motivo||'')}</p><p><strong>Estatus:</strong> ${escapeHtml(c.estatus||'programada')}</p>`}catch(e){showAlert('alertBox','danger',e.message||'Error al cargar detalles')}})()</script></body></html>
