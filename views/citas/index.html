<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/app.css">

    <style>
        #calendar {
            background: #fff;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
            min-height: 650px;
        }

        .calendar-frame {
            width: 100%;
            height: 650px;
            border: 0;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
            background: #fff;
        }

        .view-switch-btn.active {
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container-fluid py-4">
                <div id="alertBox"></div>

                <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
                    <div>
                        <h2 class="mb-0 fw-bold" style="color:#1e3a5f">Gestión de Citas</h2>
                        <p class="text-muted mb-0">Calendario y listado de citas programadas.</p>
                    </div>

                    <div class="d-flex gap-2 flex-wrap align-items-center" id="googleActions"></div>
                </div>

                <div class="card mb-4 border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">Calendario de citas</h5>
                                <p class="text-muted mb-0">
                                    Aquí se muestran las citas registradas en el sistema. Si Google Calendar está conectado, también se sincronizan con tu cuenta.
                                </p>
                            </div>

                            <div class="btn-group">
                                <button id="btnSistema" class="btn btn-outline-primary view-switch-btn active" type="button">
                                    Calendario del sistema
                                </button>
                                <button id="btnGoogle" class="btn btn-outline-primary view-switch-btn" type="button">
                                    Google Calendar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="calendarSystemBox" class="mb-4">
                    <div id="calendar"></div>
                </div>

                <div id="calendarGoogleBox" class="mb-4" style="display:none">
                    <div id="googleCalendarContainer"></div>
                </div>

                <div class="citas-table-card">
                    <div class="citas-table-header">Todas las citas</div>

                    <div class="table-responsive">
                        <table class="table table-hover mb-0" style="font-size:.875rem">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Paciente</th>
                                    <th>Fisioterapeuta</th>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                    <th>Motivo</th>
                                    <th>Estatus</th>
                                    <th>Google</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>

                            <tbody id="citasBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        renderNavbar('citas');

        let calendar = null;
        let lastCalendarEmbedUrl = '';

        function g(path) {
            return `${API_BASE_URL}${path}`;
        }

        function googleCalendarDefaultUrl() {
            return 'https://calendar.google.com/calendar/u/0/r';
        }

        function renderCalendarEmbed(embedUrl) {
            const container = document.getElementById('googleCalendarContainer');

            if (!embedUrl) {
                container.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>No hay URL embebida configurada.</strong><br>
                        Puedes abrir Google Calendar con el botón superior, pero si quieres verlo dentro de esta página,
                        agrega la variable <code>GOOGLE_CALENDAR_EMBED_URL</code> en Railway.
                    </div>
                    <a href="${googleCalendarDefaultUrl()}" target="_blank" class="btn btn-primary">
                        Abrir Google Calendar
                    </a>
                `;
                return;
            }

            container.innerHTML = `
                <iframe
                    class="calendar-frame"
                    src="${escapeHtml(embedUrl)}"
                    loading="lazy">
                </iframe>
            `;
        }

        function switchCalendarView(type) {
            const systemBox = document.getElementById('calendarSystemBox');
            const googleBox = document.getElementById('calendarGoogleBox');
            const btnSistema = document.getElementById('btnSistema');
            const btnGoogle = document.getElementById('btnGoogle');

            if (type === 'google') {
                systemBox.style.display = 'none';
                googleBox.style.display = 'block';

                btnSistema.classList.remove('active');
                btnGoogle.classList.add('active');

                renderCalendarEmbed(lastCalendarEmbedUrl);
            } else {
                googleBox.style.display = 'none';
                systemBox.style.display = 'block';

                btnGoogle.classList.remove('active');
                btnSistema.classList.add('active');

                if (calendar) {
                    setTimeout(() => calendar.updateSize(), 100);
                }
            }
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 650,
                nowIndicator: true,
                selectable: false,
                editable: false,
                eventDisplay: 'block',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana',
                    day: 'Día',
                    list: 'Lista'
                },
                events: async function (info, successCallback, failureCallback) {
                    try {
                        const events = await apiFetch('/api/citas/events');
                        successCallback(events);
                    } catch (error) {
                        failureCallback(error);
                    }
                },
                eventClick: function (info) {
                    const id = info.event.id;
                    if (id) {
                        window.location.href = `detalles.html?id=${id}`;
                    }
                },
                eventDidMount: function (info) {
                    const motivo = info.event.extendedProps?.motivo || 'Sin motivo';
                    const estatus = info.event.extendedProps?.estatus || 'programada';

                    info.el.title = `${info.event.title}\nMotivo: ${motivo}\nEstatus: ${estatus}`;
                }
            });

            calendar.render();
        }

        async function cargar() {
            try {
                const d = await apiFetch('/api/citas');

                lastCalendarEmbedUrl = d.calendar_embed_url || '';

                googleActions.innerHTML = `
                    ${
                        d.google_connected
                            ? `
                                <span class="gcal-badge connected">Google Calendar conectado</span>
                                <a href="${googleCalendarDefaultUrl()}" target="_blank" class="btn btn-sm btn-outline-primary">
                                    Abrir Google Calendar
                                </a>
                                <a href="${g('/google/calendar/disconnect')}" class="btn btn-sm btn-outline-danger">
                                    Desconectar
                                </a>
                            `
                            : `
                                <span class="gcal-badge disconnected">Google Calendar desconectado</span>
                                <a href="${g('/google/calendar/connect')}" class="btn btn-sm btn-primary">
                                    Conectar Google
                                </a>
                            `
                    }
                    <a href="crear.html" class="btn btn-success">Nueva Cita</a>
                `;

                citasBody.innerHTML = (d.citas && d.citas.length)
                    ? d.citas.map(c => `
                        <tr class="${c.estatus === 'cancelada' ? 'table-secondary' : ''}">
                            <td><strong>#${c.id_cita}</strong></td>
                            <td>${escapeHtml(c.paciente)} ${escapeHtml(c.paciente_apaterno || '')}</td>
                            <td>${escapeHtml(c.fisio)} ${escapeHtml(c.fisio_apaterno || '')}</td>
                            <td>${formatDate(c.fecha)}</td>
                            <td>${formatTime(c.hora)}</td>
                            <td>${escapeHtml(c.motivo || '—')}</td>
                            <td>
                                <span class="badge rounded-pill bg-${
                                    c.estatus === 'cancelada'
                                        ? 'danger'
                                        : (c.estatus === 'completada' ? 'success' : 'primary')
                                }">
                                    ${escapeHtml(c.estatus || 'programada')}
                                </span>
                            </td>
                            <td>
                                ${
                                    c.google_event_id
                                        ? '<span class="badge bg-success">Sincronizada</span>'
                                        : '<span class="badge bg-secondary">Solo sistema</span>'
                                }
                            </td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <a href="detalles.html?id=${c.id_cita}" class="btn btn-sm btn-outline-info">Ver</a>
                                    <a href="editar.html?id=${c.id_cita}" class="btn btn-sm btn-outline-warning">Editar</a>
                                    ${
                                        c.estatus !== 'cancelada'
                                            ? `<button class="btn btn-sm btn-outline-secondary" onclick="cancelar(${c.id_cita})">Cancelar</button>`
                                            : ''
                                    }
                                    <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${c.id_cita})">Eliminar</button>
                                </div>
                            </td>
                        </tr>
                    `).join('')
                    : '<tr><td colspan="9" class="text-center text-muted py-5">No hay citas registradas</td></tr>';

                if (calendar) {
                    calendar.refetchEvents();
                }
            } catch (e) {
                showAlert('alertBox', 'danger', e.message || 'Error al cargar citas');
            }
        }

        async function cancelar(id) {
            if (!confirm('¿Cancelar esta cita?')) {
                return;
            }

            try {
                const d = await apiFetch(`/api/citas/${id}/cancelar`, {
                    method: 'POST',
                    body: JSON.stringify({})
                });

                showAlert('alertBox', 'success', d.message || 'Cita cancelada');
                await cargar();
            } catch (e) {
                showAlert('alertBox', 'danger', e.message || 'Error al cancelar');
            }
        }

        async function eliminar(id) {
            if (!confirm('¿Eliminar permanentemente?')) {
                return;
            }

            try {
                const d = await apiFetch(`/api/citas/${id}`, {
                    method: 'DELETE'
                });

                showAlert('alertBox', 'success', d.message || 'Cita eliminada');
                await cargar();
            } catch (e) {
                showAlert('alertBox', 'danger', e.message || 'Error al eliminar');
            }
        }

        document.getElementById('btnSistema').addEventListener('click', () => switchCalendarView('sistema'));
        document.getElementById('btnGoogle').addEventListener('click', () => switchCalendarView('google'));

        initCalendar();
        cargar();
    </script>
</body>

</html>
