<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Expediente - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow consult-exp-card">
                    <div class="card-header consult-exp-header text-white">
                        <h4 class="mb-0">Consultar Expediente Médico</h4>
                    </div>
                    <div class="card-body consult-exp-body">
                        <form id="searchForm" class="mb-4">
                            <div class="input-group"><input type="text" name="query" class="form-control"
                                    placeholder="Buscar paciente por nombre, apellido, correo o teléfono..."><button
                                    class="btn btn-success" type="submit">Buscar Paciente</button></div>
                        </form>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre Completo</th>
                                        <th>Correo</th>
                                        <th>Teléfono</th>
                                        <th>Fecha Nacimiento</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="pacientesBody"></tbody>
                            </table>
                        </div>
                        <div class="mt-3"><a href="../dashboard/index.html" class="btn btn-secondary">Regresar</a></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('expedientes');</script>
    <script>async function cargar(q = '') { try { const d = await apiFetch('/api/expedientes/pacientes' + (q ? `?query=${encodeURIComponent(q)}` : '')); pacientesBody.innerHTML = (d.pacientes && d.pacientes.length) ? d.pacientes.map(p => `<tr><td>${p.id_usuario}</td><td>${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</td><td>${escapeHtml(p.correo)}</td><td>${escapeHtml(p.telefono)}</td><td>${formatDate(p.fecha_nac)}</td><td><a href="ver.html?id=${p.id_usuario}" class="btn btn-info btn-sm">Ver Expediente</a></td></tr>`).join('') : '<tr><td colspan="6" class="text-center text-muted">No se encontraron pacientes</td></tr>' } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error al buscar pacientes') } } searchForm.addEventListener('submit', e => { e.preventDefault(); cargar(new FormData(searchForm).get('query') || '') }); cargar()</script>
</body>

</html>
