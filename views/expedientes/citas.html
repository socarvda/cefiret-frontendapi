<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow">
                    <div class="card-header bg-warning text-white">
                        <h4 class="mb-0" id="tituloCitas">Citas del paciente</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                    <th>Fisioterapeuta</th>
                                    <th>Motivo</th>
                                </tr>
                            </thead>
                            <tbody id="citasBody"></tbody>
                        </table>
                        <div class="mt-4"><a id="volverExp" href="buscar.html" class="btn btn-secondary">Volver al
                                Expediente</a><a href="../dashboard/index.html" class="btn btn-primary">Ir al Inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('expedientes');</script>
    <script>const id = getParam('id'); volverExp.href = `ver.html?id=${id}`; (async () => { try { const u = await apiFetch(`/api/usuarios/${id}`); tituloCitas.textContent = `Citas de ${u.usuario.nombre} ${u.usuario.apaterno} ${u.usuario.amaterno}`; const d = await apiFetch(`/api/expedientes/pacientes/${id}/citas`); citasBody.innerHTML = (d.citas && d.citas.length) ? d.citas.map(c => `<tr><td>${formatDate(c.fecha)}</td><td>${formatTime(c.hora)}</td><td>${escapeHtml(c.fisio_nombre)} ${escapeHtml(c.fisio_apaterno)}</td><td>${escapeHtml(c.motivo || 'Sin motivo')}</td></tr>`).join('') : '<tr><td colspan="4" class="text-muted">No hay citas registradas para este paciente.</td></tr>' } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error al cargar citas') } })()</script>
</body>

</html>
