<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente Médico - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container expediente-show-page">
                <div id="alertBox"></div>
                <div class="card shadow expediente-show-card">
                    <div class="card-header expediente-show-header text-white">
                        <h4 class="mb-0">Expediente Médico</h4>
                    </div>
                    <div class="card-body expediente-show-body">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <h5>Datos del Paciente</h5>
                                <table class="table table-bordered" id="pacienteTable"></table>
                            </div>
                            <div class="col-md-6">
                                <h5>Información Médica</h5>
                                <div id="expedienteBox"></div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><a href="../rutinas/index.html" class="text-decoration-none">
                                    <div class="card">
                                        <div class="card-body text-center"><i
                                                class="bi bi-activity fs-1 text-success"></i>
                                            <h5>Rutinas</h5>
                                            <p class="text-muted">Rutinas asignadas</p>
                                        </div>
                                    </div>
                                </a></div>
                            <div class="col-md-6 mb-3"><a id="citasLink" href="#" class="text-decoration-none">
                                    <div class="card">
                                        <div class="card-body text-center"><i
                                                class="bi bi-calendar-check fs-1 text-warning"></i>
                                            <h5>Citas</h5>
                                            <p class="text-muted">Historial de citas</p>
                                        </div>
                                    </div>
                                </a></div>
                        </div>
                        <div class="mt-4"><a href="buscar.html" class="btn btn-secondary">Volver a busqueda</a><a
                                href="../dashboard/index.html" class="btn btn-primary">Ir al incio</a></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('expedientes');</script>
    <script>const id = getParam('id'); citasLink.href = `citas.html?id=${id}`; (async () => { try { const d = await apiFetch(`/api/expedientes/pacientes/${id}`); const p = d.paciente, e = d.expediente; pacienteTable.innerHTML = `<tr><th width="40%">Nombre Completo:</th><td>${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</td></tr><tr><th>Correo:</th><td>${escapeHtml(p.correo)}</td></tr><tr><th>Teléfono:</th><td>${escapeHtml(p.telefono)}</td></tr><tr><th>Fecha Nacimiento:</th><td>${formatDate(p.fecha_nac)}</td></tr>`; if (!e) { expedienteBox.innerHTML = `<p class="text-muted">No se ha completado la información médica del paciente.</p><a href="completar.html?id=${id}" class="btn btn-success">Completar expediente</a>`; return } expedienteBox.innerHTML = `<table class="table table-bordered"><tr><th width="40%">Sexo:</th><td>${escapeHtml(e.sexo)}</td></tr><tr><th>Estado Civil:</th><td>${escapeHtml(e.edo_civil)}</td></tr><tr><th>Ocupación:</th><td>${escapeHtml(e.ocupacion)}</td></tr><tr><th>Domicilio:</th><td>${escapeHtml(e.domicilio)}, ${escapeHtml(e.colonia)}, ${escapeHtml(e.municipio)}</td></tr><tr><th>Lugar de Nacimiento:</th><td>${escapeHtml(e.lugar_nac)}</td></tr><tr><th>Lugar de Residencia:</th><td>${escapeHtml(e.lugar_residencia)}</td></tr><tr><th>Contacto de Emergencia:</th><td>${escapeHtml(e.contacto_emergencia)}</td></tr><tr><th>Nacionalidad:</th><td>${escapeHtml(e.nacionalidad)}</td></tr><tr><th>Religión:</th><td>${escapeHtml(e.religion)}</td></tr><tr><th>Escolaridad:</th><td>${escapeHtml(e.escolaridad)}</td></tr><tr><th>Presión Arterial:</th><td>${escapeHtml(e.presion_arterial)}</td></tr><tr><th>Frecuencia Cardíaca:</th><td>${escapeHtml(e.frec_cardiaca)}</td></tr><tr><th>Llenado Capilar:</th><td>${escapeHtml(e.llenado_capilar)}</td></tr><tr><th>Glucosa:</th><td>${escapeHtml(e.glucosa)}</td></tr><tr><th>Frecuencia Respiratoria:</th><td>${escapeHtml(e.frec_respiratoria)}</td></tr><tr><th>Alimentación:</th><td>${escapeHtml(e.alimentacion)}</td></tr></table>` } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error al cargar expediente') } })()</script>
</body>

</html>
