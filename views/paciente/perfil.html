<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi información - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-person-circle"></i> Mi información
                        </h4>
                    </div>

                    <div class="card-body">
                        <div id="perfilContenido">
                            <div class="text-center text-muted py-4">
                                Cargando información...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaPaciente();
        renderNavbar("mi-info");

        const perfilContenido = document.getElementById("perfilContenido");

        function calcularEdad(fechaNacimiento) {
            if (!fechaNacimiento) return "";

            const nacimiento = new Date(fechaNacimiento);
            const hoy = new Date();

            let edad = hoy.getFullYear() - nacimiento.getFullYear();
            const mes = hoy.getMonth() - nacimiento.getMonth();

            if (mes < 0 || (mes === 0 && hoy.getDate() < nacimiento.getDate())) {
                edad--;
            }

            return edad;
        }

        async function cargarPerfil() {
            try {
                const data = await apiFetch("/api/me");
                const usuario = data.user || getUser();

                const nombreCompleto = [
                    usuario.nombre || "",
                    usuario.apaterno || "",
                    usuario.amaterno || ""
                ].join(" ").trim();

                perfilContenido.innerHTML = `
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Nombre completo</small>
                                <div class="fw-bold">${escapeHtml(nombreCompleto)}</div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Correo</small>
                                <div class="fw-bold">${escapeHtml(usuario.correo || "")}</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Teléfono</small>
                                <div class="fw-bold">${escapeHtml(usuario.telefono || "No registrado")}</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Fecha de nacimiento</small>
                                <div class="fw-bold">${escapeHtml(usuario.fecha_nac || "No registrada")}</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Edad aproximada</small>
                                <div class="fw-bold">${calcularEdad(usuario.fecha_nac) || "No disponible"}</div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Estado de cuenta</small>
                                <div class="fw-bold">
                                    ${Number(usuario.activo || 0) === 1
                                        ? '<span class="badge bg-success">Activo</span>'
                                        : '<span class="badge bg-warning text-dark">Pendiente</span>'
                                    }
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="border rounded p-3 h-100">
                                <small class="text-muted">Tipo de usuario</small>
                                <div class="fw-bold">
                                    <span class="badge bg-primary">Paciente</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                perfilContenido.innerHTML = `
                    <div class="alert alert-danger">
                        ${escapeHtml(error.message || "No se pudo cargar tu información.")}
                    </div>
                `;
            }
        }

        cargarPerfil();
    </script>
</body>

</html>
