<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis citas - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-calendar-event"></i> Mis citas
                        </h4>
                    </div>

                    <div class="card-body">
                        <div id="citasContenido">
                            <div class="text-center text-muted py-4">
                                Cargando citas...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaPaciente();
        renderNavbar("citas");

        const user = getUser();
        const idPaciente = user.id_usuario;
        const citasContenido = document.getElementById("citasContenido");

        function normalizarCitas(data) {
            if (Array.isArray(data)) return data;
            if (Array.isArray(data.citas)) return data.citas;
            if (Array.isArray(data.data)) return data.data;
            return [];
        }

        function obtenerEstadoCita(cita) {
            return cita.estado ||
                cita.estatus ||
                cita.estado_cita ||
                "Programada";
        }

        function badgeEstado(estado) {
            const estadoLower = String(estado || "").toLowerCase();

            if (estadoLower.includes("cancel")) return "bg-danger";
            if (estadoLower.includes("realiz")) return "bg-success";
            if (estadoLower.includes("pend")) return "bg-warning text-dark";

            return "bg-primary";
        }

        async function cargarCitas() {
            try {
                const data = await apiFetch(`/api/paciente/${idPaciente}/citas`);
                const citas = normalizarCitas(data);

                if (citas.length === 0) {
                    citasContenido.innerHTML = `
                        <div class="alert alert-info mb-0">
                            Todavía no tienes citas registradas.
                        </div>
                    `;
                    return;
                }

                citasContenido.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                    <th>Fisioterapeuta</th>
                                    <th>Motivo</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>

                            <tbody>
                                ${citas.map((cita) => {
                                    const estado = obtenerEstadoCita(cita);

                                    return `
                                        <tr>
                                            <td>${escapeHtml(cita.fecha || cita.fecha_cita || "")}</td>
                                            <td>${escapeHtml(cita.hora || cita.hora_cita || "")}</td>
                                            <td>
                                                ${escapeHtml(
                                                    cita.fisioterapeuta ||
                                                    cita.nombre_fisioterapeuta ||
                                                    cita.terapeuta ||
                                                    "No asignado"
                                                )}
                                            </td>
                                            <td>${escapeHtml(cita.motivo || cita.descripcion || "Sin motivo registrado")}</td>
                                            <td>
                                                <span class="badge ${badgeEstado(estado)}">
                                                    ${escapeHtml(estado)}
                                                </span>
                                            </td>
                                        </tr>
                                    `;
                                }).join("")}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                citasContenido.innerHTML = `
                    <div class="alert alert-danger mb-0">
                        ${escapeHtml(error.message || "No se pudieron cargar tus citas.")}
                    </div>
                `;
            }
        }

        cargarCitas();
    </script>
</body>

</html>
