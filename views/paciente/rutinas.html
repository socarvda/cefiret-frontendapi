<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis rutinas - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-activity"></i> Mis rutinas
                        </h4>
                    </div>

                    <div class="card-body">
                        <div id="rutinasContenido">
                            <div class="text-center text-muted py-4">
                                Cargando rutinas...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaPaciente();
        renderNavbar("rutinas");

        const user = getUser();
        const idPaciente = user.id_usuario;
        const rutinasContenido = document.getElementById("rutinasContenido");

        function normalizarRutinas(data) {
            if (Array.isArray(data)) return data;
            if (Array.isArray(data.rutinas)) return data.rutinas;
            if (Array.isArray(data.videos)) return data.videos;
            if (Array.isArray(data.data)) return data.data;
            return [];
        }

        function obtenerTituloRutina(rutina) {
            return rutina.video_titulo ||
                rutina.titulo ||
                rutina.nombre_video ||
                rutina.nombre_ejercicio ||
                rutina.ejercicio ||
                "Rutina asignada";
        }

        function obtenerDescripcionRutina(rutina) {
            return rutina.descripcion ||
                rutina.indicaciones ||
                rutina.observaciones ||
                rutina.detalles ||
                "Sin descripción registrada.";
        }

        function obtenerUrlVideo(rutina) {
            return rutina.url_video ||
                rutina.video_url ||
                rutina.link_video ||
                rutina.url ||
                "";
        }

        async function cargarRutinas() {
            try {
                const data = await apiFetch(`/api/paciente/${idPaciente}/videos`);
                const rutinas = normalizarRutinas(data);

                if (rutinas.length === 0) {
                    rutinasContenido.innerHTML = `
                        <div class="alert alert-info mb-0">
                            Todavía no tienes rutinas asignadas.
                        </div>
                    `;
                    return;
                }

                rutinasContenido.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Rutina</th>
                                    <th>Descripción</th>
                                    <th>Indicaciones</th>
                                    <th>Video</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rutinas.map((rutina) => {
                                    const titulo = obtenerTituloRutina(rutina);
                                    const descripcion = obtenerDescripcionRutina(rutina);
                                    const urlVideo = obtenerUrlVideo(rutina);

                                    return `
                                        <tr>
                                            <td>${formatDate(rutina.fecha || rutina.fecha_asignacion || "")}</td>
                                            <td>${escapeHtml(titulo)}</td>
                                            <td>${escapeHtml(descripcion)}</td>
                                            <td>
                                                ${rutina.repeticiones ? `${escapeHtml(rutina.repeticiones)} repeticiones` : ""}
                                                ${rutina.series ? ` / ${escapeHtml(rutina.series)} series` : ""}
                                                ${rutina.tiempo ? ` / ${escapeHtml(rutina.tiempo)} min` : ""}
                                            </td>
                                            <td>
                                                ${urlVideo ? `
                                                    <a href="${escapeHtml(urlVideo)}" target="_blank" class="btn btn-primary btn-sm">
                                                        Ver video
                                                    </a>
                                                ` : `
                                                    <span class="text-muted">Sin video</span>
                                                `}
                                            </td>
                                        </tr>
                                    `;
                                }).join("")}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                rutinasContenido.innerHTML = `
                    <div class="alert alert-danger mb-0">
                        ${escapeHtml(error.message || "No se pudieron cargar tus rutinas.")}
                    </div>
                `;
            }
        }

        cargarRutinas();
    </script>
</body>

</html>
