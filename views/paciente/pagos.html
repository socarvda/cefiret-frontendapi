<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis pagos - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Mis pagos</h4>
                    </div>

                    <div class="card-body">
                        <div class="alert alert-info">
                            Aquí puedes consultar tus pagos registrados y realizar el pago de los servicios pendientes.
                        </div>

                        <div id="pagosContenido">
                            <div class="text-center text-muted py-4">
                                Cargando pagos...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaPaciente();
        renderNavbar("pagos");

        const user = getUser();
        const idPaciente = user.id_usuario;
        const pagosContenido = document.getElementById("pagosContenido");

        function limpiarDetalle(detalle) {
            return String(detalle || "")
                .replace(/\s*\|\s*Sesión Stripe:\s*cs_[^\s|]+/gi, "")
                .replace(/\s*\|\s*Pagado Stripe/gi, "")
                .replace(/Pendiente Stripe\s*\|\s*/gi, "")
                .replace(/Pagado Stripe\s*\|\s*/gi, "")
                .trim();
        }

        function esPagado(pago) {
            return String(pago.detalle || "").toLowerCase().includes("pagado stripe") ||
                String(pago.metodo_pago || "").toLowerCase() === "stripe";
        }

        function badgePago(pago) {
            if (esPagado(pago)) {
                return '<span class="badge bg-success">Pagado</span>';
            }

            return '<span class="badge bg-warning text-dark">Pendiente</span>';
        }

        function limpiarMetodoPago(pago) {
            if (esPagado(pago)) {
                return "Stripe";
            }

            return "Pendiente";
        }

        async function cargarPagos() {
            try {
                const data = await apiFetch(`/api/paciente/${idPaciente}/pagos`);
                const pagos = data.pagos || [];

                if (pagos.length === 0) {
                    pagosContenido.innerHTML = `
                        <div class="alert alert-info mb-0">
                            Todavía no tienes pagos registrados.
                        </div>
                    `;
                    return;
                }

                pagosContenido.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Monto</th>
                                    <th>Método</th>
                                    <th>Estado</th>
                                    <th>Detalle</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>

                            <tbody>
                                ${pagos.map((pago) => `
                                    <tr>
                                        <td>${escapeHtml(pago.fecha_pago || "")}</td>
                                        <td>$${Number(pago.monto || 0).toFixed(2)} MXN</td>
                                        <td>${escapeHtml(limpiarMetodoPago(pago))}</td>
                                        <td>${badgePago(pago)}</td>
                                        <td>${escapeHtml(limpiarDetalle(pago.detalle))}</td>
                                        <td>
                                            ${esPagado(pago) ? `
                                                <button class="btn btn-secondary btn-sm" disabled>
                                                    Pagado
                                                </button>
                                            ` : `
                                                <button class="btn btn-success btn-sm" onclick="pagarConStripe(${Number(pago.id_pago)})">
                                                    Pagar
                                                </button>
                                            `}
                                        </td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                pagosContenido.innerHTML = `
                    <div class="alert alert-danger mb-0">
                        ${escapeHtml(error.message || "No se pudieron cargar tus pagos.")}
                    </div>
                `;
            }
        }

        async function pagarConStripe(idPago) {
            try {
                const data = await apiFetch(`/api/stripe/pagos/${idPago}/checkout`, {
                    method: "POST"
                });

                if (!data.checkout_url) {
                    showAlert("alertBox", "danger", "Stripe no devolvió una URL de pago.");
                    return;
                }

                window.location.href = data.checkout_url;
            } catch (error) {
                showAlert("alertBox", "danger", error.message || "No se pudo iniciar el pago.");
            }
        }

        cargarPagos();
    </script>
</body>

</html>
