<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Rutina - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow rutinas-form-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Crear Rutina</h4>
                    </div>
                    <div class="card-body rutinas-form-body">
                        <form id="rutinaForm">
                            <div class="mb-3"><label>Paciente *</label><select name="id_paciente" id="pacienteSelect"
                                    class="form-select" required></select></div>
                            <div class="mb-3"><label>Fecha de asignación *</label><input type="date"
                                    name="fecha_asignacion" class="form-control" required></div>
                            <div class="mb-3"><label>Título del video *</label><input name="video_titulo"
                                    class="form-control" required></div>
                            <div class="mb-3"><label>Descripción del video</label><textarea name="video_descripcion"
                                    class="form-control"></textarea></div>
                            <div class="mb-3"><label>URL del video *</label><input name="video_url" class="form-control"
                                    required></div>
                            <div class="row">
                                <div class="col-md-4 mb-3"><label>Repeticiones</label><input type="number"
                                        name="repeticiones" class="form-control"></div>
                                <div class="col-md-4 mb-3"><label>Series</label><input type="number" name="series"
                                        class="form-control"></div>
                                <div class="col-md-4 mb-3"><label>Tiempo</label><input type="number" name="tiempo"
                                        class="form-control"></div>
                            </div>
                            <div class="mb-3"><label>Observaciones</label><textarea name="observaciones"
                                    class="form-control"></textarea></div>
                            <div class="mb-3"><label>Días *</label>
                                <div class="row" id="diasBox"></div>
                            </div>
                            <div class="d-flex justify-content-end gap-2"><a href="index.html"
                                    class="btn btn-secondary">Cancelar</a><button class="btn btn-success">Guardar
                                    Rutina</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('rutinas');</script>
    <script>const dias = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo']; diasBox.innerHTML = dias.map(d => `<div class="col-md-3"><label><input type="checkbox" name="dias" value="${d}"> ${d[0].toUpperCase() + d.slice(1)}</label></div>`).join(''); document.querySelector('[name=fecha_asignacion]').value = new Date().toISOString().slice(0, 10); (async () => { const d = await apiFetch('/api/expedientes/pacientes'); pacienteSelect.innerHTML = '<option value="">Selecciona un paciente...</option>' + d.pacientes.map(p => `<option value="${p.id_usuario}">${escapeHtml(p.nombre)} ${escapeHtml(p.apaterno)} ${escapeHtml(p.amaterno)}</option>`).join('') })(); rutinaForm.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(rutinaForm); const payload = Object.fromEntries(fd.entries()); payload.dias = fd.getAll('dias'); try { const d = await apiFetch('/api/rutinas', { method: 'POST', body: JSON.stringify(payload) }); showAlert('alertBox', 'success', d.message || 'Rutina creada'); setTimeout(() => location.href = 'index.html', 900) } catch (err) { showAlert('alertBox', 'danger', err.message || 'Error al crear rutina') } })</script>
</body>

</html>
