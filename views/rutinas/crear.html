<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Rutina - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow rutinas-form-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Crear Rutina</h4>
                    </div>

                    <div class="card-body rutinas-form-body">
                        <form id="rutinaForm">
                            <div class="mb-3">
                                <label class="form-label">Paciente *</label>
                                <select name="id_paciente" id="pacienteSelect" class="form-select" required>
                                    <option value="">Cargando pacientes...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Fecha de asignación</label>
                                <input type="text" id="fechaAsignacionTexto" class="form-control" readonly>
                                <input type="hidden" name="fecha_asignacion" id="fechaAsignacionInput">
                                <small class="text-muted">
                                    La fecha se asigna automáticamente con el día actual.
                                </small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Título del video *</label>
                                <input name="video_titulo" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descripción del video</label>
                                <textarea name="video_descripcion" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">URL del video *</label>
                                <input name="video_url" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Series</label>
                                    <input type="number" name="series" class="form-control" min="0" placeholder="Ej. 3">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Repeticiones</label>
                                    <input type="number" name="repeticiones" class="form-control" min="0" placeholder="Ej. 12">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Tiempo en minutos</label>
                                    <input type="number" name="tiempo" class="form-control" min="0" placeholder="Ej. 20">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Observaciones</label>
                                <textarea name="observaciones" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Días *</label>
                                <div class="row" id="diasBox"></div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="index.html" class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit" class="btn btn-success">
                                    Guardar Rutina
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        renderNavbar('rutinas');

        const rutinaForm = document.getElementById('rutinaForm');
        const pacienteSelect = document.getElementById('pacienteSelect');
        const diasBox = document.getElementById('diasBox');
        const fechaAsignacionTexto = document.getElementById('fechaAsignacionTexto');
        const fechaAsignacionInput = document.getElementById('fechaAsignacionInput');

        function fechaLocalHoy() {
            const hoy = new Date();
            const year = hoy.getFullYear();
            const month = String(hoy.getMonth() + 1).padStart(2, '0');
            const day = String(hoy.getDate()).padStart(2, '0');

            return `${year}-${month}-${day}`;
        }

        function cargarFechaAutomatica() {
            const fecha = fechaLocalHoy();

            fechaAsignacionInput.value = fecha;
            fechaAsignacionTexto.value = formatDate(fecha);
        }

        function cargarDias() {
            const dias = [
                'lunes',
                'martes',
                'miércoles',
                'jueves',
                'viernes',
                'sábado',
                'domingo'
            ];

            diasBox.innerHTML = dias.map(dia => `
                <div class="col-md-3 mb-2">
                    <label class="form-check-label">
                        <input type="checkbox" name="dias" value="${dia}" class="form-check-input me-1">
                        ${dia.charAt(0).toUpperCase() + dia.slice(1)}
                    </label>
                </div>
            `).join('');
        }

        async function cargarPacientes() {
            try {
                const data = await apiFetch('/api/expedientes/pacientes');

                pacienteSelect.innerHTML = '<option value="">Selecciona un paciente...</option>' +
                    data.pacientes.map(paciente => `
                        <option value="${paciente.id_usuario}">
                            ${escapeHtml(paciente.nombre)}
                            ${escapeHtml(paciente.apaterno || '')}
                            ${escapeHtml(paciente.amaterno || '')}
                        </option>
                    `).join('');
            } catch (error) {
                pacienteSelect.innerHTML = '<option value="">Error al cargar pacientes</option>';
                showAlert('alertBox', 'danger', error.message || 'Error al cargar pacientes.');
            }
        }

        rutinaForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fd = new FormData(rutinaForm);
            const payload = Object.fromEntries(fd.entries());

            payload.fecha_asignacion = fechaAsignacionInput.value;
            payload.dias = fd.getAll('dias');

            if (!payload.dias.length) {
                showAlert('alertBox', 'danger', 'Selecciona al menos un día para la rutina.');
                return;
            }

            try {
                await apiFetch('/api/rutinas', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                window.location.href = 'index.html?created=1';
            } catch (error) {
                showAlert('alertBox', 'danger', error.message || 'Error al crear rutina.');
            }
        });

        cargarFechaAutomatica();
        cargarDias();
        cargarPacientes();
    </script>
</body>

</html>
