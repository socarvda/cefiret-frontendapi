<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Rutina - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container mt-4 rutinas-details-page">
                <div id="alertBox"></div>
                <div class="card shadow rutinas-details-card">
                    <div class="card-header rutinas-details-header text-white">
                        <h4 class="mb-0">Detalles de la Rutina</h4>
                    </div>
                    <div class="card-body rutinas-details-body" id="detalleBox"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('rutinas');</script>
    <script>const id = getParam('id'); (async () => { try { const d = await apiFetch(`/api/rutinas/${id}`), r = d.rutina; detalleBox.innerHTML = `<div class="row mb-4"><div class="col-md-6"><h5 class="text-primary mb-3">Información del Paciente</h5><div class="mb-3"><strong>Nombre:</strong><p>${escapeHtml(r.nombre)} ${escapeHtml(r.apaterno)}</p></div><div class="mb-3"><strong>Fecha de asignación:</strong><p>${formatDate(r.fecha_asignacion)}</p></div></div><div class="col-md-6"><h5 class="text-primary mb-3">Información del Video</h5><div class="mb-3"><strong>Título:</strong><p>${escapeHtml(r.titulo || 'Sin video asignado')}</p></div>${r.url ? `<a href="${escapeHtml(r.url)}" target="_blank" class="btn btn-sm btn-outline-danger">Ver video</a>` : ''}</div></div><hr><h5 class="text-primary mb-3">Detalles de Ejercicio</h5><div class="row"><div class="col-md-3"><strong>Repeticiones:</strong><p>${r.repeticiones || '—'}</p></div><div class="col-md-3"><strong>Series:</strong><p>${r.series || '—'}</p></div><div class="col-md-3"><strong>Tiempo estimado:</strong><p>${r.tiempo ? r.tiempo + ' minutos' : '—'}</p></div></div><hr><div class="mb-4"><h5 class="text-primary mb-3">Días Asignados</h5>${d.dias.length ? d.dias.map(x => `<span class="badge bg-info text-dark me-2 mb-2">${escapeHtml(x)}</span>`).join('') : '<p class="text-muted">Sin días asignados</p>'}</div><div class="mb-4"><h5 class="text-primary mb-3">Observaciones</h5>${r.observaciones ? `<div class="p-3 bg-light border rounded"><p>${escapeHtml(r.observaciones)}</p></div>` : '<p class="text-muted">Sin observaciones</p>'}</div><div class="d-flex justify-content-between align-items-center mb-3"><a href="editar.html?id=${id}" class="btn btn-primary">Editar</a><a href="index.html" class="btn btn-secondary">Regresar</a></div>` } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error al cargar detalles') } })()</script>
</body>

</html>
