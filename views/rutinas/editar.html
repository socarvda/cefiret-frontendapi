<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rutina - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow rutinas-form-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Rutina</h4>
                    </div>

                    <div class="card-body rutinas-form-body">
                        <form id="rutinaForm">
                            <div class="mb-3">
                                <label class="form-label">Título del video *</label>
                                <input name="video_titulo" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descripción del video</label>
                                <textarea name="video_descripcion" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">URL del video *</label>
                                <input name="video_url" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Series</label>
                                    <input type="number" name="series" class="form-control" min="0" placeholder="Ej. 3">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Repeticiones</label>
                                    <input type="number" name="repeticiones" class="form-control" min="0" placeholder="Ej. 12">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Tiempo en minutos</label>
                                    <input type="number" name="tiempo" class="form-control" min="0" placeholder="Ej. 20">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Observaciones</label>
                                <textarea name="observaciones" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Días *</label>
                                <div class="row" id="diasBox"></div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="index.html" class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit" class="btn btn-primary">
                                    Guardar cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        renderNavbar('rutinas');

        const id = getParam('id');
        const rutinaForm = document.getElementById('rutinaForm');
        const diasBox = document.getElementById('diasBox');

        const diasSemana = [
            'lunes',
            'martes',
            'miércoles',
            'jueves',
            'viernes',
            'sábado',
            'domingo'
        ];

        if (!id) {
            showAlert('alertBox', 'danger', 'No se recibió el ID de la rutina.');
        }

        function renderDias(diasSeleccionados = []) {
            diasBox.innerHTML = diasSemana.map(dia => {
                const checked = diasSeleccionados.includes(dia) ? 'checked' : '';

                return `
                    <div class="col-md-3 mb-2">
                        <label class="form-check-label">
                            <input type="checkbox" name="dias" value="${dia}" class="form-check-input me-1" ${checked}>
                            ${dia.charAt(0).toUpperCase() + dia.slice(1)}
                        </label>
                    </div>
                `;
            }).join('');
        }

        async function cargarRutina() {
            try {
                const data = await apiFetch(`/api/rutinas/${id}`);
                const rutina = data.rutina;
                const dias = data.dias || [];

                rutinaForm.video_titulo.value = rutina.titulo || '';
                rutinaForm.video_descripcion.value = rutina.descripcion || '';
                rutinaForm.video_url.value = rutina.url || '';
                rutinaForm.series.value = rutina.series || '';
                rutinaForm.repeticiones.value = rutina.repeticiones || '';
                rutinaForm.tiempo.value = rutina.tiempo || '';
                rutinaForm.observaciones.value = rutina.observaciones || '';

                renderDias(dias);
            } catch (error) {
                showAlert('alertBox', 'danger', error.message || 'Error al cargar rutina.');
                renderDias([]);
            }
        }

        rutinaForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fd = new FormData(rutinaForm);
            const payload = Object.fromEntries(fd.entries());

            payload.dias = fd.getAll('dias');

            if (!payload.dias.length) {
                showAlert('alertBox', 'danger', 'Selecciona al menos un día para la rutina.');
                return;
            }

            try {
                await apiFetch(`/api/rutinas/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                window.location.href = 'index.html?updated=1';
            } catch (error) {
                showAlert('alertBox', 'danger', error.message || 'Error al actualizar rutina.');
            }
        });

        renderDias([]);
        cargarRutina();
    </script>
</body>

</html>
