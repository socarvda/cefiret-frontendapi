<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rutina - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow rutinas-form-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Rutina</h4>
                    </div>
                    <div class="card-body rutinas-form-body">
                        <form id="rutinaForm">
                            <div class="mb-3"><label>Título del video *</label><input name="video_titulo"
                                    class="form-control" required></div>
                            <div class="mb-3"><label>Descripción del video</label><textarea name="video_descripcion"
                                    class="form-control"></textarea></div>
                            <div class="mb-3"><label>URL del video *</label><input name="video_url" class="form-control"
                                    required></div>
                            <div class="row">
                                <div class="col-md-4 mb-3"><label>Repeticiones</label><input type="number"
                                        name="repeticiones" class="form-control"></div>
                                <div class="col-md-4 mb-3"><label>Series</label><input type="number" name="series"
                                        class="form-control"></div>
                                <div class="col-md-4 mb-3"><label>Tiempo</label><input type="number" name="tiempo"
                                        class="form-control"></div>
                            </div>
                            <div class="mb-3"><label>Observaciones</label><textarea name="observaciones"
                                    class="form-control"></textarea></div>
                            <div class="mb-3"><label>Días *</label>
                                <div class="row" id="diasBox"></div>
                            </div>
                            <div class="d-flex justify-content-end gap-2"><a href="index.html"
                                    class="btn btn-secondary">Volver</a><button
                                    class="btn btn-primary">Actualizar</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('rutinas');</script>
    <script>const id = getParam('id'), dias = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo']; diasBox.innerHTML = dias.map(d => `<div class="col-md-3"><label><input type="checkbox" name="dias" value="${d}"> ${d[0].toUpperCase() + d.slice(1)}</label></div>`).join(''); async function cargar() { const d = await apiFetch(`/api/rutinas/${id}`), r = d.rutina; rutinaForm.video_titulo.value = r.titulo || ''; rutinaForm.video_descripcion.value = r.descripcion || ''; rutinaForm.video_url.value = r.url || ''; rutinaForm.repeticiones.value = r.repeticiones || ''; rutinaForm.series.value = r.series || ''; rutinaForm.tiempo.value = r.tiempo || ''; rutinaForm.observaciones.value = r.observaciones || ''; document.querySelectorAll('[name=dias]').forEach(cb => cb.checked = d.dias.includes(cb.value)) } rutinaForm.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(rutinaForm); const payload = Object.fromEntries(fd.entries()); payload.dias = fd.getAll('dias'); try { const d = await apiFetch(`/api/rutinas/${id}`, { method: 'PUT', body: JSON.stringify(payload) }); showAlert('alertBox', 'success', d.message || 'Rutina actualizada') } catch (err) { showAlert('alertBox', 'danger', err.message || 'Error al actualizar') } }); cargar()</script>
</body>

</html>
