<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rutinas - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../../css/app.css" />
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Rutinas</h4>
                        <a href="crear.html" class="btn btn-success">Agregar Rutina</a>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Paciente</th>
                                        <th>Fecha Asignación</th>
                                        <th>Video</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="rutinasBody">
                                    <tr>
                                        <td colspan="4" class="text-center text-muted">Cargando rutinas...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="mt-3">
                            <a href="../dashboard/index.html" class="btn btn-secondary">Regresar</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaAdminOFisio();
        renderNavbar('rutinas');

        const created = getParam('created');
        const updated = getParam('updated');

        if (created === '1') {
            showAlert('alertBox', 'success', 'Rutina registrada correctamente.');
            window.history.replaceState({}, document.title, 'index.html');
        }

        if (updated === '1') {
            showAlert('alertBox', 'success', 'Rutina actualizada correctamente.');
            window.history.replaceState({}, document.title, 'index.html');
        }

        function nombrePaciente(r) {
            return `${r.nombre || r.paciente_nombre || ''} ${r.apaterno || r.paciente_apaterno || ''} ${r.amaterno || r.paciente_amaterno || ''}`.trim();
        }

        function tituloVideo(r) {
            return r.video_titulo || r.titulo || r.nombre_video || r.video || 'Sin video';
        }

        async function cargarRutinas() {
            try {
                const d = await apiFetch('/api/rutinas');
                const rutinas = d.rutinas || d.data || [];

                rutinasBody.innerHTML = rutinas.length
                    ? rutinas.map(r => `
                        <tr>
                            <td>${escapeHtml(nombrePaciente(r) || 'No registrado')}</td>
                            <td>${formatDate(r.fecha_asignacion || r.fecha || '')}</td>
                            <td>${escapeHtml(tituloVideo(r))}</td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <a href="ver.html?id=${r.id_rutina}" class="btn btn-info btn-sm">Ver</a>
                                    <a href="editar.html?id=${r.id_rutina}" class="btn btn-warning btn-sm">Editar</a>
                                    <a href="../progreso/reporte.html?id=${r.id_usuario || r.id_paciente || r.paciente_id}" class="btn btn-primary btn-sm">Progreso</a>
                                    <button class="btn btn-danger btn-sm" onclick="eliminar(${r.id_rutina})">Eliminar</button>
                                </div>
                            </td>
                        </tr>
                    `).join('')
                    : '<tr><td colspan="4" class="text-center text-muted">No hay rutinas registradas</td></tr>';
            } catch (e) {
                showAlert('alertBox', 'danger', e.message || 'Error al cargar rutinas');
                rutinasBody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">No se pudieron cargar las rutinas</td></tr>';
            }
        }

        async function eliminar(id) {
            if (!confirm('¿Eliminar esta rutina?')) return;

            try {
                const d = await apiFetch(`/api/rutinas/${id}`, {
                    method: 'DELETE'
                });

                showAlert('alertBox', 'success', d.message || 'Rutina eliminada correctamente.');
                cargarRutinas();
            } catch (e) {
                showAlert('alertBox', 'danger', e.message || 'Error al eliminar rutina');
            }
        }

        cargarRutinas();
    </script>
</body>

</html>
