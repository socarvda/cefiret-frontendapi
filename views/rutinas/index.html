<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rutinas - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />

    <link rel="stylesheet" href="../../css/app.css" />
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Rutinas</h4>
                        <a href="crear.html" class="btn btn-success">Agregar Rutina</a>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Paciente</th>
                                        <th>Fecha Asignación</th>
                                        <th>Video</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>

                                <tbody id="rutinasBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <a href="../dashboard/index.html" class="btn btn-secondary mt-3">
                    Regresar
                </a>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        renderNavbar("rutinas");

        const created = getParam('created');
        const updated = getParam('updated');

        if (created === '1') {
            showAlert('alertBox', 'success', 'Rutina creada correctamente.');
            window.history.replaceState({}, document.title, 'index.html');
        }

        if (updated === '1') {
            showAlert('alertBox', 'success', 'Rutina actualizada correctamente.');
            window.history.replaceState({}, document.title, 'index.html');
        }
    </script>

    <script>
        async function cargar() {
            try {
                const d = await apiFetch("/api/rutinas");

                rutinasBody.innerHTML =
                    d.rutinas && d.rutinas.length
                        ? d.rutinas
                            .map((r) => {
                                const pacienteId =
                                    r.id_usuario || r.paciente_id || r.id_paciente;

                                return `
                      <tr>
                        <td>
                          ${escapeHtml(r.nombre)}
                          ${escapeHtml(r.apaterno)}
                          ${escapeHtml(r.amaterno || "")}
                        </td>

                        <td>${formatDate(r.fecha_asignacion)}</td>

                        <td>${escapeHtml(r.video_titulo || "")}</td>

                        <td>
                          <div class="d-flex gap-1 flex-wrap">
                            <a
                              href="detalles.html?id=${r.id_rutina}"
                              class="btn btn-sm btn-outline-info"
                            >
                              Ver
                            </a>

                            <a
                              href="editar.html?id=${r.id_rutina}"
                              class="btn btn-sm btn-outline-warning"
                            >
                              Editar
                            </a>

                            <a
                              href="../progreso/ver.html?id=${pacienteId}"
                              class="btn btn-sm btn-outline-success"
                            >
                              Progreso
                            </a>

                            <button
                              class="btn btn-sm btn-outline-danger"
                              onclick="eliminar(${r.id_rutina})"
                            >
                              Eliminar
                            </button>
                          </div>
                        </td>
                      </tr>
                    `;
                            })
                            .join("")
                        : `
                <tr>
                  <td colspan="4" class="text-center text-muted">
                    No hay rutinas registradas
                  </td>
                </tr>
              `;
            } catch (e) {
                showAlert(
                    "alertBox",
                    "danger",
                    e.message || "Error al cargar rutinas",
                );
            }
        }

        async function eliminar(id) {
            if (!confirm("¿Eliminar rutina?")) return;

            try {
                const d = await apiFetch(`/api/rutinas/${id}`, {
                    method: "DELETE",
                });

                showAlert("alertBox", "success", d.message || "Rutina eliminada");
                cargar();
            } catch (e) {
                showAlert("alertBox", "danger", e.message || "Error al eliminar");
            }
        }

        cargar();
    </script>
</body>

</html>
