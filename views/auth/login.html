<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../../css/app.css"></head><body class="login-body"><div class="login-box"><div class="logo"><img src="../../img/logo.jpg" alt="CEFIRET logo" onerror="this.style.display='none'"><h2>CEFIRET</h2><p class="text-muted">Iniciar Sesión</p></div><div id="alertBox"></div><form id="loginForm"><div class="mb-3"><label class="form-label">Correo Electrónico</label><input type="email" name="email" class="form-control" required></div><div class="mb-3"><label class="form-label">Contraseña</label><input type="password" name="password" class="form-control" required></div><button type="submit" class="btn btn-login">Iniciar Sesión</button></form><p class="mt-3 text-center"><a href="forgot.html">¿Olvidaste tu contraseña?</a></p></div><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script>document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();try{const data=await apiFetch('/api/login',{method:'POST',body:JSON.stringify(formToObject(this))});setSession(data.token,data.user);window.location.href='../dashboard/index.html'}catch(err){showAlert('alertBox','danger',err.message||'Correo o contraseña incorrectos')}})</script></body></html>
