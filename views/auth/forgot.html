<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Recuperar contraseña - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../../css/app.css"></head><body class="login-body"><div class="login-box"><h2>¿Olvidaste tu contraseña?</h2><div id="alertBox"></div><form id="forgotForm"><div class="mb-3"><label class="form-label">Correo electrónico</label><input type="email" name="correo" class="form-control" required></div><button type="submit" class="btn btn-login">Solicitar contraseña</button></form><p class="mt-4 text-center"><a href="login.html">Volver a iniciar sesión</a></p></div><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script>document.getElementById('forgotForm').addEventListener('submit',async function(e){e.preventDefault();try{const d=await apiFetch('/api/password/email',{method:'POST',body:JSON.stringify(formToObject(this))});showAlert('alertBox','success',d.message||'Revisa tu correo')}catch(err){showAlert('alertBox','danger',err.message||'No se pudo enviar el correo')}})</script></body></html>
