<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar pago - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Registrar pago pendiente</h4>
                    </div>

                    <div class="card-body">
                        <form id="pagoForm">
                            <div class="mb-3">
                                <label class="form-label">Paciente *</label>
                                <select name="id_usuario" id="pacienteSelect" class="form-select" required>
                                    <option value="">Cargando pacientes...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Monto *</label>
                                <input type="number" step="0.01" min="1" name="monto" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Detalle *</label>
                                <textarea name="detalle" class="form-control" rows="4" required placeholder="Ejemplo: Sesión de fisioterapia, valoración inicial, rehabilitación de rodilla, etc."></textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="index.html" class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit" class="btn btn-success" id="guardarBtn">
                                    Registrar pago
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaAdminOFisio();
        renderNavbar("pagos");

        const pagoForm = document.getElementById("pagoForm");
        const pacienteSelect = document.getElementById("pacienteSelect");
        const guardarBtn = document.getElementById("guardarBtn");

        async function cargarPacientes() {
            try {
                const data = await apiFetch("/api/usuarios");
                const usuarios = data.usuarios || [];
                const pacientes = usuarios.filter((usuario) => Number(usuario.id_tipo_usuario) === 3);

                if (pacientes.length === 0) {
                    pacienteSelect.innerHTML = '<option value="">No hay pacientes registrados</option>';
                    return;
                }

                pacienteSelect.innerHTML = `
                    <option value="">Selecciona un paciente</option>
                    ${pacientes.map((paciente) => {
                        const nombre = `${paciente.nombre || ""} ${paciente.apaterno || ""} ${paciente.amaterno || ""}`.trim();

                        return `
                            <option value="${Number(paciente.id_usuario)}">
                                ${escapeHtml(nombre)} - ${escapeHtml(paciente.correo || "")}
                            </option>
                        `;
                    }).join("")}
                `;
            } catch (error) {
                pacienteSelect.innerHTML = '<option value="">Error al cargar pacientes</option>';
                showAlert("alertBox", "danger", error.message || "No se pudieron cargar los pacientes.");
            }
        }

        pagoForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            guardarBtn.disabled = true;
            guardarBtn.textContent = "Guardando...";

            try {
                const data = await apiFetch("/api/pagos-admin", {
                    method: "POST",
                    body: JSON.stringify(formToObject(pagoForm))
                });

                showAlert("alertBox", "success", data.message || "Pago registrado correctamente.");

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 800);
            } catch (error) {
                showAlert("alertBox", "danger", error.message || "No se pudo registrar el pago.");
            } finally {
                guardarBtn.disabled = false;
                guardarBtn.textContent = "Registrar pago";
            }
        });

        cargarPacientes();
    </script>
</body>

</html>
