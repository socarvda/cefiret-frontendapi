<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago exitoso - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Pago realizado</h4>
                    </div>

                    <div class="card-body text-center">
                        <div id="resultadoPago">
                            <p class="text-muted">Confirmando pago con Stripe...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();

        const user = getUser();
        const resultadoPago = document.getElementById("resultadoPago");
        const sessionId = getParam("session_id");

        const esPaciente = Number(user?.id_tipo_usuario || 0) === 3;

        renderNavbar("pagos");

        function urlRegreso() {
            return esPaciente ? "../paciente/pagos.html" : "../pagos/index.html";
        }

        function textoRegreso() {
            return esPaciente ? "Ver mis pagos" : "Volver a pagos";
        }

        function urlInicio() {
            return esPaciente ? "../paciente/perfil.html" : "../dashboard/index.html";
        }

        async function confirmarPago() {
            if (!sessionId) {
                resultadoPago.innerHTML = `
                    <div class="alert alert-danger">
                        No se recibió la sesión de Stripe.
                    </div>

                    <a href="${urlRegreso()}" class="btn btn-primary">
                        ${textoRegreso()}
                    </a>
                `;
                return;
            }

            try {
                const data = await apiFetch("/api/stripe/confirmar", {
                    method: "POST",
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                resultadoPago.innerHTML = `
                    <div class="alert alert-success">
                        ${escapeHtml(data.message || "Pago confirmado correctamente.")}
                    </div>

                    <a href="${urlRegreso()}" class="btn btn-primary">
                        ${textoRegreso()}
                    </a>

                    <a href="${urlInicio()}" class="btn btn-secondary">
                        Ir al inicio
                    </a>
                `;
            } catch (error) {
                resultadoPago.innerHTML = `
                    <div class="alert alert-danger">
                        ${escapeHtml(error.message || "No se pudo confirmar el pago.")}
                    </div>

                    <a href="${urlRegreso()}" class="btn btn-primary">
                        ${textoRegreso()}
                    </a>

                    <a href="${urlInicio()}" class="btn btn-secondary">
                        Ir al inicio
                    </a>
                `;
            }
        }

        confirmarPago();
    </script>
</body>

</html>
