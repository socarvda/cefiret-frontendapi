<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - CEFIRET</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>

    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>

                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Pagos</h4>

                        <a href="crear.html" class="btn btn-light btn-sm">
                            Registrar pago
                        </a>
                    </div>

                    <div class="card-body">
                        <div id="pagosContenido">
                            <div class="text-center text-muted py-4">
                                Cargando pagos...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>

    <script>
        requireAuth();
        protegerPaginaAdminOFisio();
        renderNavbar("pagos");

        const pagosContenido = document.getElementById("pagosContenido");

        function esPagado(pago) {
            return String(pago.detalle || "").toLowerCase().includes("pagado stripe") ||
                String(pago.metodo_pago || "").toLowerCase() === "stripe";
        }

        function badgePago(pago) {
            if (esPagado(pago)) {
                return '<span class="badge bg-success">Pagado</span>';
            }

            return '<span class="badge bg-warning text-dark">Pendiente</span>';
        }

        async function cargarPagos() {
            try {
                const data = await apiFetch("/api/pagos-admin");
                const pagos = data.pagos || [];

                if (pagos.length === 0) {
                    pagosContenido.innerHTML = `
                        <div class="alert alert-info mb-0">
                            No hay pagos registrados.
                        </div>
                    `;
                    return;
                }

                pagosContenido.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Paciente</th>
                                    <th>Correo</th>
                                    <th>Monto</th>
                                    <th>Fecha</th>
                                    <th>Método</th>
                                    <th>Estado</th>
                                    <th>Detalle</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>

                            <tbody>
                                ${pagos.map((pago) => {
                                    const paciente = `${pago.nombre || ""} ${pago.apaterno || ""} ${pago.amaterno || ""}`.trim();

                                    return `
                                        <tr>
                                            <td>${escapeHtml(paciente)}</td>
                                            <td>${escapeHtml(pago.correo || "")}</td>
                                            <td>$${Number(pago.monto || 0).toFixed(2)} MXN</td>
                                            <td>${escapeHtml(pago.fecha_pago || "")}</td>
                                            <td>${escapeHtml(pago.metodo_pago || "")}</td>
                                            <td>${badgePago(pago)}</td>
                                            <td>${escapeHtml(pago.detalle || "")}</td>
                                            <td>
                                                ${esPagado(pago) ? `
                                                    <button class="btn btn-secondary btn-sm" disabled>
                                                        Pagado
                                                    </button>
                                                ` : `
                                                    <button class="btn btn-success btn-sm" onclick="pagarConStripe(${Number(pago.id_pago)})">
                                                        Pagar
                                                    </button>
                                                `}
                                            </td>
                                        </tr>
                                    `;
                                }).join("")}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                pagosContenido.innerHTML = `
                    <div class="alert alert-danger mb-0">
                        ${escapeHtml(error.message || "No se pudieron cargar los pagos.")}
                    </div>
                `;
            }
        }

        async function pagarConStripe(idPago) {
            try {
                const data = await apiFetch(`/api/stripe/pagos/${idPago}/checkout`, {
                    method: "POST"
                });

                if (!data.checkout_url) {
                    showAlert("alertBox", "danger", "Stripe no devolvió una URL de pago.");
                    return;
                }

                window.location.href = data.checkout_url;
            } catch (error) {
                showAlert("alertBox", "danger", error.message || "No se pudo iniciar el pago.");
            }
        }

        cargarPagos();
    </script>
</body>

</html>
