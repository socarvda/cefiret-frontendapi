<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Videos - CEFIRET</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="../../css/app.css"></head><body><div id="appNavbar"></div><div class="container"><main class="main-content"><div class="container"><div id="alertBox"></div><h2 class="mb-4">Videos registrados</h2><a href="create.html" class="btn btn-primary mb-4">Nuevo Video</a><div id="videosBox"><div class="alert alert-info">Este módulo visual se conserva del MVC. En tu backend API actual los videos se administran desde Rutinas usando la tabla video + rutinadetalles.</div></div></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../js/config.js"></script><script src="../../js/api.js"></script><script src="../../js/layout.js"></script><script>requireAuth();renderNavbar('videos');</script><script>(async()=>{try{const d=await apiFetch('/api/rutinas');const videos=(d.rutinas||[]).filter(r=>r.video_titulo);if(videos.length)videosBox.innerHTML=videos.map(v=>`<div class="video-card"><div class="video-title">${escapeHtml(v.video_titulo)}</div><a href="${escapeHtml(v.video_url||'#')}" target="_blank" class="video-url">${escapeHtml(v.video_url||'')}</a></div>`).join('')}catch(e){}}</script></body></html>
