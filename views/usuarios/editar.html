<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Usuario</h4>
                    </div>
                    <div class="card-body">
                        <form id="editForm">
                            <div class="row">
                                <div class="col-md-4 mb-3"><label class="form-label">Nombre *</label><input type="text"
                                        name="nombre" class="form-control" required></div>
                                <div class="col-md-4 mb-3"><label class="form-label">Apellido Paterno *</label><input
                                        type="text" name="apaterno" class="form-control" required></div>
                                <div class="col-md-4 mb-3"><label class="form-label">Apellido Materno *</label><input
                                        type="text" name="amaterno" class="form-control" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label">Correo *</label><input type="email"
                                        name="correo" class="form-control" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label">Teléfono *</label><input
                                        type="text" name="telefono" class="form-control" required></div>
                            </div>
                            <div class="mb-3"><label class="form-label">Fecha de Nacimiento *</label><input type="date"
                                    name="fecha_nac" class="form-control" required></div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end"><a href="buscar.html"
                                    class="btn btn-secondary me-md-2">Cancelar</a><button type="submit"
                                    class="btn btn-primary">Actualizar</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('usuarios');</script>
    <script>const id = getParam('id'); async function cargar() { try { const d = await apiFetch(`/api/usuarios/${id}`); const u = d.usuario; for (const k of ['nombre', 'apaterno', 'amaterno', 'correo', 'telefono', 'fecha_nac']) editForm[k].value = u[k] || '' } catch (e) { showAlert('alertBox', 'danger', e.message || 'No se pudo cargar usuario') } } editForm.addEventListener('submit', async e => { e.preventDefault(); try { const d = await apiFetch(`/api/usuarios/${id}`, { method: 'PUT', body: JSON.stringify(formToObject(editForm)) }); showAlert('alertBox', 'success', d.message || 'Usuario actualizado') } catch (err) { showAlert('alertBox', 'danger', err.message || 'Error al actualizar') } }); cargar()</script>
</body>

</html>
