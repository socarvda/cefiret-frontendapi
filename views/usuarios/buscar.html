<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Usuario - CEFIRET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/app.css">
</head>

<body>
    <div id="appNavbar"></div>
    <div class="container">
        <main class="main-content">
            <div class="container">
                <div id="alertBox"></div>
                <div class="card shadow search-user-card">
                    <div class="card-header search-user-header text-white">
                        <h4 class="mb-0">Buscar y actualizar usuarios</h4>
                    </div>
                    <div class="card-body search-user-body">
                        <form id="searchForm" class="mb-4">
                            <div class="input-group"><input type="text" name="query" class="form-control"
                                    placeholder="Buscar por nombre, apellido, correo o teléfono..."><button
                                    class="btn btn-primary" type="submit">Buscar</button></div>
                        </form>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre Completo</th>
                                        <th>Correo</th>
                                        <th>Teléfono</th>
                                        <th>Fecha Nacimiento</th>
                                        <th>Tipo</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="usuariosBody"></tbody>
                            </table>
                        </div>
                        <div class="mt-3"><a href="../dashboard/index.html" class="btn btn-secondary">Regresar</a></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/layout.js"></script>
    <script>requireAuth(); renderNavbar('usuarios');</script>
    <script>async function cargar(q = '') { try { const d = await apiFetch('/api/usuarios' + (q ? `?query=${encodeURIComponent(q)}` : '')); usuariosBody.innerHTML = (d.usuarios && d.usuarios.length) ? d.usuarios.map(u => `<tr><td>${u.id_usuario}</td><td>${escapeHtml(u.nombre)} ${escapeHtml(u.apaterno)} ${escapeHtml(u.amaterno)}</td><td>${escapeHtml(u.correo)}</td><td>${escapeHtml(u.telefono)}</td><td>${formatDate(u.fecha_nac)}</td><td>${u.id_tipo_usuario}</td><td><a href="editar.html?id=${u.id_usuario}" class="btn btn-warning btn-sm">Editar</a></td></tr>`).join('') : '<tr><td colspan="7" class="text-center text-muted">No se encontraron usuarios</td></tr>' } catch (e) { showAlert('alertBox', 'danger', e.message || 'Error al buscar') } } searchForm.addEventListener('submit', e => { e.preventDefault(); cargar(new FormData(searchForm).get('query') || '') }); cargar()</script>
</body>

</html>
